<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDrive パスコンバーター</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #ffffff;
    --bg2:      #f4f3f1;
    --bg3:      #eae9e6;
    --text:     #1a1918;
    --muted:    #6b6a67;
    --hint:     #a8a7a3;
    --border:   rgba(0,0,0,0.09);
    --border2:  rgba(0,0,0,0.16);
    --accent:   #185FA5;
    --accent-l: #E6F1FB;
    --accent-d: #0C447C;
    --ok-bg:    #EAF3DE;
    --ok:       #3B6D11;
    --err-bg:   #FCEBEB;
    --err:      #A32D2D;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
    --r: 7px;
    --rl: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #1e1d1b;
      --bg2:     #272623;
      --bg3:     #302f2c;
      --text:    #eae9e6;
      --muted:   #9e9d99;
      --hint:    #5e5d5a;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.14);
      --accent:  #4A9EE0;
      --accent-l:#042C53;
      --accent-d:#B5D4F4;
      --ok-bg:   #173404;
      --ok:      #97C459;
      --err-bg:  #501313;
      --err:     #F09595;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 400px;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
  }

  .win {
    width: 400px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  /* ── Title bar ── */
  .titlebar {
    height: 40px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border2);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
    -webkit-app-region: drag;
    user-select: none;
  }
  .titlebar-icon {
    width: 20px; height: 20px; border-radius: 5px;
    background: var(--accent-l);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .titlebar-icon svg { width: 12px; height: 12px; }
  .titlebar-name { font-size: 12px; font-weight: 500; color: var(--text); }
  .titlebar-sub  { font-size: 10px; color: var(--hint); font-family: var(--mono); margin-left: 2px; }

  /* ── Body ── */
  .body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .body::-webkit-scrollbar { width: 4px; }
  .body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Input ── */
  .lbl {
    font-size: 10px; color: var(--hint); font-family: var(--mono);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 5px;
  }
  textarea {
    width: 100%; height: 72px; resize: none;
    font-family: var(--mono); font-size: 11px; line-height: 1.6;
    padding: 8px 10px;
    background: var(--bg2);
    color: var(--text);
    border: 0.5px solid var(--border2);
    border-radius: var(--r);
    transition: border-color 0.15s;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--hint); font-size: 10.5px; }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 6px; }
  .btn {
    flex: 1; padding: 7px 0; font-size: 12px; font-family: var(--sans);
    font-weight: 500; border-radius: var(--r); cursor: pointer;
    border: 0.5px solid var(--border2); transition: all 0.13s;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover  { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost  { background: transparent; color: var(--muted); }
  .btn-ghost:hover  { background: var(--bg2); color: var(--text); }

  /* ── Error ── */
  .err-box {
    background: var(--err-bg); color: var(--err);
    border-radius: var(--r); padding: 7px 10px;
    font-size: 11px; line-height: 1.55;
    display: none;
  }

  /* ── Separator ── */
  .sep {
    height: 0.5px; background: var(--border);
    margin: 0 -12px;
  }

  /* ── Result cards ── */
  .results { display: none; flex-direction: column; gap: 7px; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--rl);
    overflow: hidden;
  }
  .card-head {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
  }
  .av {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500; font-family: var(--mono);
    flex-shrink: 0; letter-spacing: -0.5px;
  }
  .av-k { background: #E6F1FB; color: #0C447C; }
  .av-d { background: #E1F5EE; color: #085041; }
  .av-h { background: #FAEEDA; color: #633806; }

  .card-name  { font-size: 12px; font-weight: 500; color: var(--text); }
  .card-email { font-size: 10px; color: var(--hint); font-family: var(--mono); }

  .copy-btn {
    margin-left: auto;
    font-size: 10px; font-family: var(--mono);
    padding: 3px 9px;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: 5px; cursor: pointer;
    color: var(--muted); transition: all 0.13s;
    white-space: nowrap;
  }
  .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .copy-btn.ok    { background: var(--ok-bg); color: var(--ok); border-color: transparent; }

  .card-path {
    padding: 8px 10px;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--muted); line-height: 1.6;
    word-break: break-all; white-space: pre-wrap;
  }
  .card-path em {
    font-style: normal;
    background: var(--accent-l);
    color: var(--accent-d);
    border-radius: 2px; padding: 0 2px;
  }

  /* ── Copy all ── */
  .copy-all-wrap { display: flex; justify-content: flex-end; }
  .copy-all-btn {
    font-size: 10px; font-family: var(--mono);
    padding: 5px 12px;
    background: transparent;
    border: 0.5px solid var(--border2);
    border-radius: var(--r); cursor: pointer;
    color: var(--muted); transition: all 0.13s;
  }
  .copy-all-btn:hover { background: var(--bg2); color: var(--text); }
  .copy-all-btn.ok    { background: var(--ok-bg); color: var(--ok); border-color: transparent; }

  /* ── Hint ── */
  .hint-txt {
    font-size: 10px; color: var(--hint); font-family: var(--mono);
    text-align: center; padding: 2px 0 4px;
  }
</style>
</head>
<body>
<div id="auth-screen" style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);">
  <form onsubmit="return checkPw()" style="text-align:center;display:flex;flex-direction:column;gap:10px;align-items:center;">
    <div style="font-size:12px;color:var(--muted);font-family:var(--mono);">パスワードを入力</div>
    <input id="pw" type="password" autofocus
      style="width:200px;padding:8px 10px;font-family:var(--mono);font-size:13px;background:var(--bg2);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r);outline:none;text-align:center;"
    >
    <button type="submit" class="btn btn-primary" style="width:200px;">入る</button>
    <div id="pw-err" style="font-size:11px;color:var(--err);display:none;">パスワードが違います</div>
  </form>
</div>
<div class="win" id="main-app" style="display:none;">

  <!-- Title bar -->
  <div class="titlebar">
    <div class="titlebar-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    <span class="titlebar-name">GDrive パスコンバーター</span>
    <span class="titlebar-sub">fugenlaw.com</span>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Input -->
    <div>
      <div class="lbl">パスを貼り付け</div>
      <textarea id="inp"
        placeholder="/Users/yuikoki/.../マイドライブ/ファイル.docx&#10;または&#10;[GoogleDrive]/マイドライブ/ファイル.docx"
      ></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="convert()">変換する</button>
      <button class="btn btn-ghost"   onclick="clearAll()">クリア</button>
    </div>

    <div class="hint-txt">Cmd+Enter でも変換できます</div>

    <!-- Error -->
    <div class="err-box" id="err"></div>

    <!-- Separator -->
    <div class="sep" id="sep" style="display:none"></div>

    <!-- Results -->
    <div class="results" id="results">
      <div id="cards"></div>
      <div class="copy-all-wrap">
        <button class="copy-all-btn" id="copyAllBtn" onclick="copyAll()">全員分コピー</button>
      </div>
    </div>

  </div>
</div>

<script>
function checkPw() {
  if (document.getElementById("pw").value === "h") {
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("main-app").style.display = "flex";
    sessionStorage.setItem("authed", "1");
  } else {
    document.getElementById("pw-err").style.display = "block";
  }
  return false;
}
if (sessionStorage.getItem("authed") === "1") {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("main-app").style.display = "flex";
}

const MEMBERS = [
  { name:"Koki Yui",         initials:"KY", email:"yui.k@fugenlaw.com",             user:"yuikoki",            av:"av-k", tag:"あなた" },
  { name:"Daiki Matsuda",    initials:"DM", email:"daiki.m@fugenlaw.com",            user:"daiki.matsuda",      av:"av-d", tag:null },
  { name:"Hiroto Shimauchi", initials:"HS", email:"shimauchi.h@fugenlaw.com",         user:"hiroto",             av:"av-h", tag:null },
];

function gdRoot(m) {
  return `/Users/${m.user}/Library/CloudStorage/GoogleDrive-${m.email}`;
}

function normalize(raw) {
  const t = raw.trim();
  if (!t) return null;
  if (t.startsWith("[GoogleDrive]/")) return t.slice("[GoogleDrive]".length);
  for (const m of MEMBERS) {
    const r = gdRoot(m);
    if (t.startsWith(r)) return t.slice(r.length);
  }
  const match = t.match(/\/Users\/[^/]+\/Library\/CloudStorage\/GoogleDrive-[^/]+(\/.+)/);
  if (match) return match[1];
  return null;
}

function highlightPath(full, relative) {
  const base = full.slice(0, full.length - relative.length);
  return `<em>${esc(base)}</em>${esc(relative)}`;
}
function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function convert() {
  const raw = document.getElementById("inp").value;
  const errEl = document.getElementById("err");
  const results = document.getElementById("results");
  const sep = document.getElementById("sep");

  errEl.style.display = "none";
  results.style.display = "none";
  sep.style.display = "none";

  const rel = normalize(raw);
  if (!rel) {
    errEl.textContent = "Google Drive パスとして認識できませんでした。";
    errEl.style.display = "block";
    return;
  }

  const container = document.getElementById("cards");
  container.innerHTML = "";

  MEMBERS.forEach((m, i) => {
    const full = gdRoot(m) + rel;
    const tagHtml = m.tag
      ? `<span style="font-size:9px;background:var(--accent-l);color:var(--accent-d);padding:1px 6px;border-radius:99px;font-family:var(--mono);margin-left:4px;">${m.tag}</span>`
      : "";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-head">
        <div class="av ${m.av}">${m.initials}</div>
        <div>
          <div class="card-name">${m.name}${tagHtml}</div>
          <div class="card-email">${m.email}</div>
        </div>
        <button class="copy-btn" data-path="${full.replace(/"/g,'&quot;')}" onclick="copyOne(this)">コピー</button>
      </div>
      <div class="card-path">${highlightPath(full, rel)}</div>
    `;
    container.appendChild(card);
  });

  sep.style.display = "block";
  results.style.display = "flex";
  document.getElementById("copyAllBtn").textContent = "全員分コピー";
  document.getElementById("copyAllBtn").classList.remove("ok");
}

function copyOne(btn) {
  const path = btn.getAttribute("data-path");
  navigator.clipboard.writeText(path).then(() => {
    const o = btn.textContent;
    btn.textContent = "完了";
    btn.classList.add("ok");
    setTimeout(() => { btn.textContent = o; btn.classList.remove("ok"); }, 1800);
  });
}

function copyAll() {
  const paths = MEMBERS.map((m, i) => {
    const el = document.querySelectorAll(".card-path")[i];
    return el ? `[${m.name}]\n${el.textContent.trim()}` : "";
  }).filter(Boolean).join("\n\n");

  navigator.clipboard.writeText(paths).then(() => {
    const btn = document.getElementById("copyAllBtn");
    btn.textContent = "コピー完了";
    btn.classList.add("ok");
    setTimeout(() => { btn.textContent = "全員分コピー"; btn.classList.remove("ok"); }, 2000);
  });
}

function clearAll() {
  document.getElementById("inp").value = "";
  document.getElementById("err").style.display = "none";
  document.getElementById("results").style.display = "none";
  document.getElementById("sep").style.display = "none";
  document.getElementById("cards").innerHTML = "";
  document.getElementById("inp").focus();
}

document.getElementById("inp").addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") convert();
});
</script>
</body>
</html>
